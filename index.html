<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Co哥世界人文Podcast Podcast</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 40px 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 10px; margin-bottom: 30px; }
        h1 { margin: 0; font-size: 2.5em; }
        .episode { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .episode h2 { margin-top: 0; color: #2c3e50; }
        .date { color: #7f8c8d; font-size: 0.9em; margin-bottom: 15px; }
        audio { width: 100%; margin-top: 15px; }
        .footer { text-align: center; margin-top: 40px; color: #95a5a6; font-size: 0.9em; }
    </style>
</head>
<body>
    <header>
        <h1>Co哥世界人文Podcast</h1>
        <p>深度挖掘全球歷史傳奇與人文精神</p>
    </header>
    <div id="episodes">載入中...</div>
    <div class="footer">© 2026 Producer CoolAI Studio. All rights reserved.</div>

    <script>
        fetch('feed.xml')
            .then(response => response.text())
            .then(str => new window.DOMParser().parseFromString(str, "text/xml"))
            .then(data => {
                const items = data.querySelectorAll("item");
                let html = "";
                items.forEach(el => {
                    const title = el.querySelector("title").textContent;
                    const desc = el.querySelector("description").textContent;
                    const audioUrl = el.querySelector("enclosure").getAttribute("url");
                    const pubDate = new Date(el.querySelector("pubDate").textContent).toLocaleDateString('zh-TW');
                    
                    html += `
                        <div class="episode">
                            <h2>${title}</h2>
                            <div class="date">發佈日期：${pubDate}</div>
                            <p>${desc.replace(/\n/g, '<br>')}</p>
                            <audio controls>
                                <source src="${audioUrl}" type="audio/mpeg">
                                您的瀏覽器不支援音訊播放。
                            </audio>
                        </div>
                    `;
                });
                document.getElementById("episodes").innerHTML = html || "<p>目前還沒有節目上架喔！</p>";
            })
            .catch(err => document.getElementById("episodes").innerHTML = "<p>載入節目失敗，請稍後再試。</p>");
    </script>
</body>
</html>
